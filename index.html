<style>

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);
  z-index:9999;
}

.modal-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:1100px;
  height:85%;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

.modal iframe{

}

<script>
function openModal(dartId){
  document.getElementById("modal").style.display="block";
  document.getElementById("dartFrame").src =
  "https://dartpad.dev/embed-dart.html?id=" + dartId;
}

function closeModal(){
  document.getElementById("modal").style.display="none";

<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan OOP Dart - Putra Dhafir</title>

  <!-- Font Keren -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0a1f1a 0%, #0d2b22 50%, #0a1f1a 100%);
      font-family: 'Cairo', sans-serif;
      color: #d4af37;
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* --- EFEK KETUPAT BACKGROUND ANIMASI --- */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image:
        linear-gradient(45deg, #1a5c3a 25%, transparent 25%),
        linear-gradient(-45deg, #1a5c3a 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #1a5c3a 75%),
        linear-gradient(-45deg, transparent 75%, #1a5c3a 75%);
      background-size: 60px 60px;
      background-position: 0 0, 0 30px, 30px -30px, -30px 0px;
      opacity: 0.15;
      z-index: -1;
      pointer-events: none;
      animation: ketupatMove 20s linear infinite;
    }

    @keyframes ketupatMove {
      0% { background-position: 0 0, 0 30px, 30px -30px, -30px 0px; }
      100% { background-position: 60px 60px, 60px 90px, 90px 30px, 30px 30px; }
    }

    /* --- PARTICLE EFFECT --- */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #d4af37;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 15s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.3; }
      50% { transform: translateY(-100px) translateX(50px); opacity: 0.6; }
    }

    /* --- HEADER MODERN --- */
    header {
      background: linear-gradient(135deg, #1a5c3a 0%, #2a7a4a 100%);
      padding: 40px 20px;
      text-align: center;
      border-bottom: 6px solid #d4af37;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    header::before {
      content: '🌙';
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 30px;
      opacity: 0.3;
      animation: moonGlow 3s ease-in-out infinite;
    }

    header::after {
      content: '🌙';
      position: absolute;
      top: 10px;
      left: 20px;
      font-size: 30px;
      opacity: 0.3;
      animation: moonGlow 3s ease-in-out infinite 1.5s;
    }

    @keyframes moonGlow {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    header h1 {
      font-size: 20px;
      line-height: 1.6;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    header p {
      font-size: 11px;
      margin-top: 15px;
      letter-spacing: 1px;
    }

    /* --- CONTAINER --- */
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    /* --- CARD MODERN --- */
    .card {
      background: rgba(13, 43, 34, 0.95);
      padding: 25px;
      margin-bottom: 40px;
      border: 4px solid #d4af37;
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #d4af37, #ffd700, #d4af37);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(212, 175, 55, 0.3);
    }

    h2 {
      font-size: 14px;
      color: #ffd700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      position: relative;
      padding-left: 15px;
    }

    h2::before {
      content: '🌙';
      position: absolute;
      left: -25px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
    }

    p, li {
      font-size: 11px;
      line-height: 1.8;
      text-align: justify;
    }

    ul {
      padding-left: 25px;
      margin: 15px 0;
    }

    li {
      margin-bottom: 8px;
    }

    /* --- CODE PRE STYLE --- */
    pre {
      background: #051410;
      color: #90ee90;
      padding: 20px;
      font-size: 10px;
      overflow-x: auto;
      border: 3px solid #d4af37;
      border-radius: 10px;
      font-family: 'Courier New', monospace;
      margin: 15px 0;
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    pre::-webkit-scrollbar {
      height: 8px;
    }

    pre::-webkit-scrollbar-track {
      background: #051410;
    }

    pre::-webkit-scrollbar-thumb {
      background: #d4af37;
      border-radius: 4px;
    }

    /* --- BUTTON MODERN --- */
    .run-btn-container {
      text-align: center;
      margin-top: 20px;
    }

    .run-btn {
      background: linear-gradient(135deg, #1a5c3a 0%, #2a7a4a 100%);
      color: #d4af37;
      border: 4px solid #d4af37;
      padding: 15px 30px;
      font-family: 'Cairo', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 6px 6px 0px #051410;
      display: inline-block;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .run-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .run-btn:hover::before {
      left: 100%;
    }

    .run-btn:hover {
      transform: translateY(-3px);
      box-shadow: 8px 8px 0px #051410;
      background: linear-gradient(135deg, #2a7a4a 0%, #3a9a5a 100%);
    }

    .run-btn:active {
      transform: translateY(2px);
      box-shadow: 4px 4px 0px #051410;
    }

    /* --- FORUM KOMENTAR --- */
    .forum-container {
      background: rgba(13, 43, 34, 0.95);
      padding: 25px;
      margin-bottom: 40px;
      border: 4px solid #d4af37;
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);
      border-radius: 15px;
      position: relative;
      overflow: hidden;
    }

    .forum-container::before {
      content: '💬';
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      opacity: 0.2;
    }

    .forum-container h2 {
      font-size: 14px;
      color: #ffd700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .forum-container input,
    .forum-container textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 10px;
      background: #051410;
      color: #d4af37;
      border: 3px solid #d4af37;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .forum-container input:focus,
    .forum-container textarea:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    .forum-container button {
      background: linear-gradient(135deg, #1a5c3a 0%, #2a7a4a 100%);
      color: #d4af37;
      padding: 12px 25px;
      border: 3px solid #d4af37;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .forum-container button:hover {
      background: linear-gradient(135deg, #2a7a4a 0%, #3a9a5a 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    #comment-list {
      margin-top: 20px;
    }

    .comment-box {
      margin-top: 15px;
      border-top: 2px dashed #d4af37;
      padding-top: 10px;
      background: rgba(5, 20, 16, 0.5);
      padding: 10px;
      border-radius: 8px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- MODAL POPUP --- */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      height: 85%;
      background: #0d2b22;
      border: 4px solid #d4af37;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from { transform: translate(-50%, -60%); opacity: 0; }
      to { transform: translate(-50%, -50%); opacity: 1; }
    }

    .modal-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-modal {
      position: absolute;
      right: 20px;
      top: 15px;
      font-size: 40px;
      color: #d4af37;
      cursor: pointer;
      z-index: 1001;
      font-weight: 900;
      transition: all 0.3s ease;
    }

    .close-modal:hover {
      color: #ffd700;
      transform: rotate(90deg);
    }

    /* --- FOOTER --- */
    footer {
      background: linear-gradient(135deg, #1a5c3a 0%, #2a7a4a 100%);
      text-align: center;
      padding: 25px;
      font-size: 11px;
      border-top: 6px solid #d4af37;
      position: relative;
      overflow: hidden;
    }

    footer::before {
      content: '🌙';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 50px;
      opacity

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan OOP Dart - Putra Dhafir</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* NAVBAR */
nav{
  padding:20px 40px;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  position:sticky;
  top:0;
}

nav h1{
  font-size:22px;
}

/* CONTAINER */
.container{
  padding:50px 10%;
}

.profile{
  margin-bottom:40px;
  line-height:1.8;
  opacity:0.9;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:15px;
  margin-bottom:30px;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  opacity:0.8;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  z-index:999;
}

.modal-content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:95%;
  max-width:1200px;
  height:85%;
  background:white;
  border-radius:15px;
  overflow:hidden;
}

.modal iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<nav>
  <h1>Laporan OOP Dart - Putra Dhafir Nashrullah</h1>
</nav>

<div class="container">

<div class="profile">
<b>NIM:</b> 251410024 <br>
Mata Kuliah: Object Oriented Programming (OOP) - Dart
</div>

<div class="card">
<h2>1. Class & Object (Car)</h2>
<button onclick="openModal('ISI_ID_1')">Lihat Source & Jalankan</button>
</div>

<div class="card">
<h2>2. Constructor</h2>
<button onclick="openModal('ISI_ID_2')">Lihat Source & Jalankan</button>
</div>

<div class="card">
<h2>3. Validasi Constructor (Mahasiswa)</h2>
<button onclick="openModal('ISI_ID_3')">Lihat Source & Jalankan</button>
</div>

<div class="card">
<h2>4. Encapsulation (Person)</h2>
<button onclick="openModal('ISI_ID_4')">Lihat Source & Jalankan</button>
</div>

<div class="card">
<h2>5. Named Parameter (Produk)</h2>
<button onclick="openModal('ISI_ID_5')">Lihat Source & Jalankan</button>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <iframe id="dartFrame"></iframe>
  </div>
</div>

<script>
function openModal(dartId){
  document.getElementById("modal").style.display="block";
  document.getElementById("dartFrame").src =
  "https://dartpad.dev/embed-dart.html?id=" + dartId;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("dartFrame").src="";
}
</script>

</body>
</html>
